apiVersion: apps/v1
kind: Deployment
metadata:
  name: trueroas-api
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: trueroas-api
  template:
    metadata:
      labels:
        app: trueroas-api
    spec:
      containers:
      - name: trueroas-api
        image: trueroas-engine:latest
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "1"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        envFrom:
        - secretRef:
            name: trueroas-secrets