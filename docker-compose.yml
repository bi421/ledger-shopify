version: '3.8'

services:
  api:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FB_ACCESS_TOKEN=${FB_ACCESS_TOKEN}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
      - DATABASE_PATH=/app/data/warehouse.duckdb
    volumes:
      - ./data:/app/data
    command: uvicorn src.trueroas.api.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      - api
    environment:
      - FB_ACCESS_TOKEN=${FB_ACCESS_TOKEN}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
    volumes:
      - ./data:/app/data
    command: python deploy_local.py

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

volumes:
  data: